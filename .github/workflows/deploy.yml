name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Record start time
        id: start-time
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Get short commit hash
        id: commit-hash
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ECR_REPOSITORY }}:latest
            ${{ secrets.ECR_REPOSITORY }}:${{ steps.commit-hash.outputs.short_sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

      - name: Print Docker image size
        run: |
          echo "Image built and pushed successfully"
          echo "Image pushed as: ${{ secrets.ECR_REPOSITORY }}:latest"
          echo "Image pushed as: ${{ secrets.ECR_REPOSITORY }}:${{ steps.commit-hash.outputs.short_sha }}"
          echo "Image digest: ${{ steps.docker-build.outputs.imageid }}"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          MONGO_DB_PROBLEMS: ${{ secrets.MONGO_DB_PROBLEMS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REDIS_URL: redis://localhost:6379
          PORT: ${{ secrets.PORT }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.commit-hash.outputs.short_sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: MONGODB_URL,MONGO_DB_PROBLEMS,JWT_SECRET,GEMINI_API_KEY,REDIS_URL,PORT,ECR_REPOSITORY,IMAGE_TAG
          script: |
            aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}
            
            # Start Redis
            docker run -d \
              --name redis \
              --restart always \
              -p 6379:6379 \
              redis:alpine || true
            
            # Pull and deploy backend
            docker pull $ECR_REPOSITORY:$IMAGE_TAG
            docker stop backend || true
            docker rm backend || true
            docker run -d \
              --name backend \
              -p 5000:5000 \
              --restart always \
              -e MONGODB_URL="$MONGODB_URL" \
              -e MONGO_DB_PROBLEMS="$MONGO_DB_PROBLEMS" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e GEMINI_API_KEY="$GEMINI_API_KEY" \
              -e REDIS_URL="$REDIS_URL" \
              -e PORT="$PORT" \
              $ECR_REPOSITORY:$IMAGE_TAG

      - name: Health check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 8
          HEALTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" http://$EC2_HOST:5000/)
          if [ "$HEALTH_CHECK" = "200" ]; then
            echo "✅ Deploy successful, service is healthy"
            exit 0
          else
            echo "❌ Deploy failed health check (HTTP $HEALTH_CHECK)"
            exit 1
          fi

      - name: Print total pipeline time
        if: always()
        run: |
          END_TIME=$(date +%s)
          START_TIME=${{ steps.start-time.outputs.start_time }}
          DURATION=$((END_TIME - START_TIME))
          echo "Total pipeline time: ${DURATION}s"